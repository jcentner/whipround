# Whipround reverse-proxy vhost — drop in alongside the existing site on this box.
#
#   /etc/nginx/sites-available/whipround.com  ->  symlink into sites-enabled/
#
# The standalone Astro/Node server (whipround-web.service) listens on 127.0.0.1:4321.
# Free-tier Cloudflare sits in front of nginx. TLS is terminated the same way as the
# other vhost on this box (certbot); run `certbot --nginx -d whipround.com -d www.whipround.com`
# after this file is enabled and it will inject the :443 block + the :80 redirect.

server {
    listen 80;
    listen [::]:80;
    server_name whipround.com www.whipround.com;

    # Modest cap; the OG image and progress JSON are the only dynamic routes.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The app owns caching: hashed assets are immutable, /api/progress is
        # Cache-Control: max-age=60 so Cloudflare absorbs launch spikes. Do not
        # override Cache-Control here.
    }
}
